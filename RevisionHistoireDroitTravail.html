<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 Mes Révisions - QCM Interactif</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Masquer la barre de défilement pour les onglets sur mobile */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-12">

    <div class="max-w-md mx-auto px-4 pt-4">

        <div class="sticky top-2 z-50 bg-white/95 backdrop-blur-md rounded-2xl p-4 shadow-md border border-slate-100 mb-6 transition-all">
            <div class="flex justify-between items-center mb-2">
                
                <div class="flex items-center gap-2.5">
                    <a href="index.html" class="flex items-center justify-center p-2 rounded-xl bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-600 transition-all" title="Retour à l'accueil">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                    </a>
                    <h1 class="font-extrabold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">🚀 Objectif Réussite</h1>
                </div>

                <span id="global-score" class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm">Score : 0 / 0</span>
            </div>
            
            <div class="w-full bg-slate-100 rounded-full h-3 mb-4 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="flex gap-1.5 overflow-x-auto pb-1 no-scrollbar text-xs">
                <button onclick="switchSection('all')" id="tab-all" class="tab-btn bg-indigo-600 text-white px-3.5 py-2 rounded-xl font-bold shrink-0 shadow-sm transition-all">Tout afficher</button>
                <button onclick="switchSection('P1')" id="tab-P1" class="tab-btn bg-slate-100 text-slate-600 px-3.5 py-2 rounded-xl font-bold shrink-0 transition-all">P1</button>
                <button onclick="switchSection('P2.1')" id="tab-P2.1" class="tab-btn bg-slate-100 text-slate-600 px-3.5 py-2 rounded-xl font-bold shrink-0 transition-all">P2.1</button>
                <button onclick="switchSection('P2.2')" id="tab-P2.2" class="tab-btn bg-slate-100 text-slate-600 px-3.5 py-2 rounded-xl font-bold shrink-0 transition-all">P2.2</button>
                <button onclick="switchSection('P2.3')" id="tab-P2.3" class="tab-btn bg-slate-100 text-slate-600 px-3.5 py-2 rounded-xl font-bold shrink-0 transition-all">P2.3</button>
                <button onclick="switchSection('P3')" id="tab-P3" class="tab-btn bg-slate-100 text-slate-600 px-3.5 py-2 rounded-xl font-bold shrink-0 transition-all">P3</button>
            </div>
            
            <div class="flex justify-end mt-2">
                <button onclick="resetApp()" class="text-[10px] text-slate-400 hover:text-red-500 font-medium transition-colors">🔄 Recommencer à zéro</button>
            </div>
        </div>

        <div id="questions-list" class="space-y-5"></div>

        <footer class="text-center text-slate-400 text-xs mt-12 mb-6">
            Fichier autonome de révisions • Conçu pour mobile 📱
        </footer>

    </div>

    <script>
const questionsData = [
    
];

        let currentSection = 'all';
        // Structure de sauvegarde locale : { questionId: { selectedOption: 'A', validated: true } }
        let userProgress = JSON.parse(localStorage.getItem('qcm_progress_save')) || {};

        // INITIALISATION AU CHARGEMENT
        document.addEventListener("DOMContentLoaded", () => {
            renderQuestions();
            updateScoreAndProgress();
        });

        // RE-DESSINER LES QUESTIONS SUR L'ÉCRAN
        function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = '';

            // Filtrer les questions selon l'onglet actif
            const filteredQuestions = questionsData.filter(q => currentSection === 'all' || q.section === currentSection);

            if(filteredQuestions.length === 0) {
                container.innerHTML = `<div class="text-center p-8 bg-white rounded-2xl border border-slate-200 text-slate-500 font-medium">Aucune question dans cette section pour le moment.</div>`;
                return;
            }

            filteredQuestions.forEach(q => {
                const progress = userProgress[q.id] || {};
                const isValidated = progress.validated || false;
                const savedOption = progress.selectedOption || null;

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl p-5 shadow-sm border border-slate-100 transition-all ${isValidated ? 'opacity-90' : ''}`;
                card.id = `card-${q.id}`;

                // Header de la carte de question
                let html = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[11px] font-extrabold uppercase tracking-wider bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md">Section ${q.section}</span>
                        <span class="text-xs font-semibold text-indigo-500">${q.label}</span>
                    </div>
                    <p class="font-bold text-slate-950 mb-4 text-[15px] leading-snug">${q.text}</p>
                    <div class="space-y-2.5" id="options-group-${q.id}">
                `;

                // Génération des 4 boutons d'options (A, B, C, D)
                Object.keys(q.options).forEach(optKey => {
                    let btnClass = "w-full text-left p-4 rounded-xl border border-slate-200 text-sm font-semibold transition-all flex items-center justify-between active:scale-[0.99] ";
                    
                    if (isValidated) {
                        // Rendu si déjà validé
                        if (optKey === q.correct) {
                            btnClass += "bg-emerald-50 border-emerald-500 text-emerald-800 ring-2 ring-emerald-500/20";
                        } else if (optKey === savedOption && savedOption !== q.correct) {
                            btnClass += "bg-red-50 border-red-400 text-red-800";
                        } else {
                            btnClass += "bg-slate-50 text-slate-400 border-slate-100";
                        }
                    } else {
                        // Rendu si en cours de sélection
                        if (optKey === savedOption) {
                            btnClass += "border-indigo-600 bg-indigo-50 text-indigo-900 ring-2 ring-indigo-600/10";
                        } else {
                            btnClass += "bg-white hover:bg-slate-50 text-slate-700 border-slate-200";
                        }
                    }

                    // Icône de validation visuelle simple
                    let checkIcon = "";
                    if (isValidated && optKey === q.correct) checkIcon = "<span>✅</span>";
                    if (isValidated && optKey === savedOption && savedOption !== q.correct) checkIcon = "<span>❌</span>";

                    html += `
                        <button onclick="selectOption(${q.id}, '${optKey}')" ${isValidated ? 'disabled' : ''} class="${btnClass}">
                            <span class="pr-2">${optKey}. ${q.options[optKey]}</span>
                            ${checkIcon}
                        </button>
                    `;
                });

                html += `</div>`;

                // Bouton de validation d'action
                if (!isValidated) {
                    html += `
                        <button onclick="validateAnswer(${q.id}, '${q.correct}')" id="btn-valider-${q.id}" class="mt-4 w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold text-sm shadow-sm active:scale-95 transition-all">
                            Valider ma réponse
                        </button>
                    `;
                }

                // Boîte d'explication cachée ou visible
                html += `
                    <div id="explanation-${q.id}" class="${isValidated ? '' : 'hidden'} mt-4 p-4 bg-gradient-to-br from-slate-50 to-indigo-50/30 rounded-xl border border-slate-100 text-xs text-slate-700 leading-relaxed">
                        <span class="font-extrabold text-slate-900 block mb-1 text-sm">💡 Explication pédagogique :</span>
                        ${q.explanation}
                    </div>
                `;

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // ACTION DE CLIC SUR UNE OPTION
        function selectOption(questionId, optionKey) {
            if (userProgress[questionId] && userProgress[questionId].validated) return;

            // Enregistrer le choix temporaire
            userProgress[questionId] = {
                selectedOption: optionKey,
                validated: false
            };

            // Sauvegarder l'état
            localStorage.setItem('qcm_progress_save', JSON.stringify(userProgress));
            
            // Rafraîchir visuellement la liste sans tout recharger
            renderQuestions();
        }

        // ACTION DE VALIDATION DE LA RÉPONSE
        function validateAnswer(questionId, correctOption) {
            if (!userProgress[questionId] || !userProgress[questionId].selectedOption) {
                alert("S'il te plaît, choisis une réponse avant de valider ! 😊");
                return;
            }

            userProgress[questionId].validated = true;
            localStorage.setItem('qcm_progress_save', JSON.stringify(userProgress));

            // Mettre à jour l'affichage de la carte et du score global
            renderQuestions();
            updateScoreAndProgress();
        }

        // MISE À JOUR DU SCORE ET DE LA BARRE DE PROGRESSION
        function updateScoreAndProgress() {
            const totalQuestions = questionsData.length;
            let validatedCount = 0;
            let correctCount = 0;

            questionsData.forEach(q => {
                if (userProgress[q.id] && userProgress[q.id].validated) {
                    validatedCount++;
                    if (userProgress[q.id].selectedOption === q.correct) {
                        correctCount++;
                    }
                }
            });

            // Mettre à jour le texte du score
            document.getElementById('global-score').innerText = `Score : ${correctCount} / ${totalQuestions}`;

            // Calculer le pourcentage de complétion globale
            const percent = totalQuestions > 0 ? (validatedCount / totalQuestions) * 100 : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // CHANGEMENT D'ONGLET (FILTRE)
        function switchSection(sectionId) {
            currentSection = sectionId;
            
            // Mettre à jour le style visuel des onglets en haut
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });

            const activeTab = document.getElementById(`tab-${sectionId}`);
            activeTab.classList.remove('bg-slate-100', 'text-slate-600');
            activeTab.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');

            renderQuestions();
        }

        // RÉINITIALISATION COMPLÈTE
        function resetApp() {
            if (confirm("Es-tu sûre de vouloir réinitialiser tout ton historique de révisions ?")) {
                localStorage.removeItem('qcm_progress_save');
                userProgress = {};
                switchSection('all');
                updateScoreAndProgress();
            }
        }
    </script>
</body>
</html>
