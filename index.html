        id: 56,
        section: "P2.1",
        label: "Question 26 / 70",
        text: "Qui est surnommé le 'Chef d'orchestre' de la procédure collective et quel est son rôle exact ?",
        options: {
            A: "L'Administrateur Judiciaire.",
            B: "Le Juge-Commissaire (désigné parmi les membres du tribunal), qui veille au déroulement de la procédure et autorise les actes importants.",
            C: "Le représentant des salariés.",
            D: "Le plus gros créancier chirographaire."
        },
        correct: "B",
        explanation: "Le Juge-Commissaire est le véritable chef d'orchestre de la PC (L.621-9)[cite: 145]. Il encadre les opérations au quotidien, autorise les actes de disposition du débiteur, tranche sur l'admission des créances et valide les licenciements en RJ/LJ[cite: 145]."
    },
    {
        id: 57,
        section: "P2.1",
        label: "Question 27 / 70",
        text: "En quelle année la profession de mandataire de faillite a-t-elle été scindée en deux branches distinctes (Administrateur et Mandataire) ?",
        options: {
            A: "En 1807, lors de la rédaction du Code de commerce.",
            B: "En 1967, par la loi Houin.",
            C: "En 1985, pour séparer la défense des intérêts de l'entreprise de celle des créanciers.",
            D: "En 2021, suite à l'ordonnance sur les sûretés."
        },
        correct: "C",
        explanation: "C'est la grande réforme de 1985 qui a séparé le corps unique des syndics en deux professions libérales réglementées distinctes : les AJ (côté entreprise) et les MJ (côté créanciers)[cite: 145]."
    },
    {
        id: 58,
        section: "P2.1",
        label: "Question 28 / 70",
        text: "Quelle est la mission fondamentale d'un Administrateur Judiciaire (AJ) lors de la période d'observation ?",
        options: {
            A: "Liquider au plus vite les meubles et immeubles de la société.",
            B: "Assister le dirigeant dans la gestion ou co-gérer l'entreprise, décider de la poursuite des contrats en cours et concourir à l'élaboration du plan de sauvegarde/redressement.",
            C: "Défendre uniquement les intérêts financiers exclusifs de l'État.",
            D: "Remplacer le Juge-Commissaire en cas d'absence."
        },
        correct: "B",
        explanation: "L'AJ intervient pour épauler la restructuration de l'entreprise[cite: 145]. Il possède le monopole de la décision concernant la continuation des contrats en cours et assiste le débiteur pour construire le plan de sortie de crise[cite: 145]."
    },
    {
        id: 59,
        section: "P2.1",
        label: "Question 29 / 70",
        text: "Quand la désignation d'un Administrateur Judiciaire (AJ) devient-elle légalement OBLIGATOIRE pour le tribunal ?",
        options: {
            A: "Dès que l'entreprise possède au moins 1 salarié.",
            B: "Dès que l'entreprise dépasse le seuil de 20 salariés ou réalise un chiffre d'affaires supérieur à 3 millions d'euros.",
            C: "Uniquement en cas de fraude avérée du dirigeant.",
            D: "Elle est obligatoire pour TOUTES les procédures de sauvegarde sans exception de taille."
        },
        correct: "B",
        explanation: "En principe, la désignation d'un AJ est facultative pour les petites structures [cite: 145], mais devient obligatoire en sauvegarde ou RJ si l'entreprise compte plus de 20 salariés ou réalise plus de 3 millions d'euros de chiffre d'affaires[cite: 145]."
    },
    {
        id: 60,
        section: "P2.1",
        label: "Question 30 / 70",
        text: "Quel organe détient le 'monopole des actions engagées dans l'intérêt collectif des créanciers' (Art. L.622-20) ?",
        options: {
            A: "Le Président de la Chambre de Commerce.",
            B: "Le Mandataire Judiciaire (ou le Liquidateur en cas de LJ).",
            C: "Le chef de l'administration fiscale.",
            D: "Chaque créancier individuellement par le biais de son avocat."
        },
        correct: "B",
        explanation: "L'article L.622-20 confère au Mandataire Judiciaire un monopole d'action pour défendre l'intérêt collectif des créanciers[cite: 145]. Un créancier individuel ne peut agir en réparation d'un préjudice collectif, sauf s'il démontre un préjudice personnel et distinct[cite: 145]."
    },
    {
        id: 61,
        section: "P2.1",
        label: "Question 31 / 70",
        text: "Quelle est la position de la Cour de cassation (Arrêt de 2006) concernant l'action d'un créancier contre des associés tenus indéfiniment aux dettes (ex: SNC) ?",
        options: {
            A: "Le créancier n'a aucun droit d'agir contre les associés.",
            B: "La responsabilité personnelle des associés tenus aux dettes sociales autorise chaque créancier à agir individuellement contre eux, car cela échappe au monopole du liquidateur.",
            C: "Seul le Juge-Commissaire peut attaquer les associés en justice.",
            D: "L'action est suspendue pendant une durée minimale de 10 ans."
        },
        correct: "B",
        explanation: "Par un arrêt marquant de 2006, la Cour de cassation considère que l'action contre les associés tenus indéfiniment au passif social (comme en SNC) est une action propre à chaque créancier, non captée par le monopole du mandataire/liquidateur[cite: 145]."
    },
    {
        id: 62,
        section: "P2.1",
        label: "Question 32 / 70",
        text: "Qui est le représentant des salariés dans une procédure collective et quel est son statut ?",
        options: {
            A: "Un auditeur externe envoyé par l'inspection du travail.",
            B: "Un salarié de l'entreprise désigné par le personnel ou le CSE ; il bénéficie du statut protecteur contre le licenciement.",
            C: "Le directeur des ressources humaines d'office.",
            D: "Un avocat bénévole nommé par le Juge-Commissaire."
        },
        correct: "B",
        explanation: "Le représentant des salariés (élu par les salariés ou issu du CSE) sert d'intermédiaire pour vérifier le passif salarial[cite: 145]. Pour exercer sa mission sereinement, il est légalement qualifié de 'salarié protégé'[cite: 145]."
    },
    {
        id: 63,
        section: "P2.1",
        label: "Question 33 / 70",
        text: "Qui sont les 'contrôleurs' dans une PC et comment sont-ils désignés ?",
        options: {
            A: "Des agents de l'URSSAF et du fisc qui vérifient la comptabilité.",
            B: "Des créanciers (de 1 à 5 maximum) désignés par le Juge-Commissaire pour assister les mandataires et surveiller la procédure.",
            C: "Des policiers spécialisés dans la délinquance financière.",
            D: "Des actionnaires minoritaires mécontents de la gestion."
        },
        correct: "B",
        explanation: "Les contrôleurs sont choisis par le Juge-Commissaire parmi les créanciers qui en font la demande (maximum 5)[cite: 145]. Les administrations publiques créancières (Fisc, URSSAF) y ont droit si elles le sollicitent[cite: 145]."
    },
    {
        id: 64,
        section: "P2.1",
        label: "Question 34 / 70",
        text: "Quel pouvoir de substitution exceptionnel détiennent les contrôleurs en cas de carence du MJ ou du LJ ?",
        options: {
            A: "Ils peuvent signer les fiches de paie des salariés à leur place.",
            B: "Ils peuvent, après mise en demeure restée infructueuse, exercer les actions relevant de la compétence exclusive du mandataire (ex : assigner en extension de procédure).",
            C: "Ils ont le droit de vendre directement les immeubles de la société.",
            D: "Ils peuvent prononcer la clôture définitive de la liquidation d'office."
        },
        correct: "B",
        explanation: "Selon l'article L.621-11, les contrôleurs ont un rôle supplétif[cite: 145]. Si le MJ ou le LJ refuse d'agir (ex: action en extension), les contrôleurs peuvent le mettre en demeure et agir en justice 'en lieu et place' du mandataire défaillant (Arrêt de 2019)[cite: 145]."
    },
    {
        id: 65,
        section: "P2.1",
        label: "Question 35 / 70",
        text: "Quelles sont les personnes physiques (PP) éligibles au régime des procédures collectives selon l'article L.620-2 ?",
        options: {
            A: "Tous les citoyens français sans exception, même les étudiants et retraités.",
            B: "Les Entrepreneurs Individuels (EI) exploitant personnellement et de manière indépendante une activité économique (commerciale, artisanale, agricole, civile ou libérale).",
            C: "Uniquement les salariés du secteur privé en situation de surendettement.",
            D: "Exclusivement les fonctionnaires de catégorie A."
        },
        correct: "B",
        explanation: "L'article L.620-2 applique les PC à toute personne physique exerçant une activité professionnelle indépendante (qu'elle soit commerciale, artisanale, libérale réglementée, agricole ou civile)[cite: 149, 151]."
    },
    {
        id: 66,
        section: "P2.1",
        label: "Question 36 / 70",
        text: "Quelles personnes physiques sont formellement EXCLUS du champ d'application des procédures collectives ?",
        options: {
            A: "Les artisans et commerçants de fait.",
            B: "Les salariés, les conjoints collaborateurs (non déclarés co-exploitants) et les dirigeants/mandataires sociaux agissant pour le compte d'une société.",
            C: "Les avocats et les médecins libéraux.",
            D: "Les agriculteurs exploitant sous forme individuelle."
        },
        correct: "B",
        explanation: "Le salarié n'exerce pas de manière indépendante pour son propre compte[cite: 151]. De même, le dirigeant social est un mandataire qui agit au nom de la PM et n'est donc pas personnellement éligible aux PC pour ses fonctions de gestion[cite: 151]."
    },
    {
        id: 67,
        section: "P2.1",
        label: "Question 37 / 70",
        text: "Quelle est la portée de l'arrêt du 27 septembre 2016 concernant la contestation de l'activité d'un Entrepreneur Individuel ?",
        options: {
            A: "L'immatriculation au RNE crée une présomption irréfragable qui empêche toute contestation.",
            B: "L'ouverture d'une PC peut être contestée s'il est prouvé que le créancier qui a assigné le débiteur ne pouvait ignorer que ce dernier avait déjà cessé son activité professionnelle.",
            C: "Un professionnel radié reste éligible aux PC pendant une durée de 20 ans.",
            D: "Seul le fisc peut contester la réalité de l'activité commerciale."
        },
        correct: "B",
        explanation: "L'immatriculation au Registre National des Entreprises (RNE) a une visée statistique[cite: 151]. L'arrêt de 2016 précise que si le créancier assignant savait pertinemment que l'activité avait cessé au moment d'agir, la PC individuelle ne peut s'ouvrir sur ce fondement[cite: 151]."
    },
    {
        id: 68,
        section: "P2.1",
        label: "Question 38 / 70",
        text: "Quelles personnes morales (PM) sont expressément EXCLUS du droit des procédures collectives ?",
        options: {
            A: "Les sociétés anonymes (SA) et les SARL.",
            B: "Toutes les personnes morales de droit public (l'État, les collectivités territoriales, les établissements publics traditionnels).",
            C: "Les associations à but non lucratif.",
            D: "Les sociétés civiles immobilières (SCI)."
        },
        correct: "B",
        explanation: "L'article L.620-2 exclut les PM de droit public (comme l'État ou les communes) du champ des PC[cite: 150, 151]. En revanche, les PM de droit privé investies d'une mission de service public (comme certains EPIC ou structures mixtes immatriculées) y sont soumises[cite: 151]."
    },
    {
        id: 69,
        section: "P2.1",
        label: "Question 39 / 70",
        text: "Que se passe-t-il si plusieurs personnes co-exploitent une activité économique sans créer de structure juridique (ex: société créée de fait) ?",
        options: {
            A: "Le tribunal ouvre une seule procédure collective globale au nom de la structure fictive.",
            B: "Le tribunal ouvre autant de procédures collectives individuelles distinctes qu'il y a d'associés co-exploitants pris personnellement.",
            C: "L'activité est immédiatement fermée par la police administrative sans jugement.",
            D: "Les dettes sont automatiquement transférées à l'administration fiscale."
        },
        correct: "B",
        explanation: "En l'absence de personne morale propre (société créée de fait, co-titularité de fonds sans statuts), la PC ne peut viser la structure inexistante[cite: 151]. Le tribunal doit ouvrir autant de procédures collectives individuelles que de co-exploitants[cite: 151]."
    },
    {
        id: 70,
        section: "P2.1",
        label: "Question 40 / 70",
        text: "Depuis la loi du 14 février 2022, quel mécanisme protège le patrimoine personnel d'un Entrepreneur Individuel (EI) ?",
        options: {
            A: "L'effacement total de l'impôt sur le revenu.",
            B: "La séparation automatique et de plein droit de son patrimoine en deux : un patrimoine professionnel (seul gage des créanciers pro) et un patrimoine personnel.",
            C: "L'interdiction absolue d'hypothéquer ses biens.",
            D: "La prise en charge de ses dettes par la commission de surendettement dès le premier euro."
        },
        correct: "B",
        explanation: "La loi du 14 février 2022 a créé une séparation automatique des patrimoines pour l'EI (L.526-22)[cite: 151]. Sauf exception (fraude, confusion, renonciation expresse), la PC ouverte pour le volet pro n'appréhende et ne saisit que le patrimoine professionnel[cite: 151]."
    },
    {
        id: 71,
        section: "P2.1",
        label: "Question 41 / 70",
        text: "Quel est le principe d'articulation si un EI a son patrimoine professionnel ET son patrimoine personnel tous les deux en difficulté ?",
        options: {
            A: "Le Tribunal de commerce fusionne tout et saisit l'intégralité des biens sans distinction.",
            B: "Le tribunal de la PC traite le patrimoine pro (créanciers pro) et oriente le débiteur vers la commission de surendettement pour le volet personnel (créanciers perso), sauf en cas de confusion.",
            C: "La commission de surendettement absorbe la procédure collective commerciale.",
            D: "Toutes les procédures sont annulées et l'entrepreneur est déclaré intouchable."
        },
        correct: "B",
        explanation: "L'article L.681-1 dispose d'une articulation duale [cite: 151] : le tribunal de la PC gère les dettes professionnelles sur le gage pro, tandis que la commission des particuliers traite le passif personnel, maintenant l'étanchéité des deux masses de créanciers[cite: 151]."
    },
    {
        id: 72,
        section: "P2.1",
        label: "Question 42 / 70",
        text: "À quelle condition stricte un créancier peut-il assigner en Liquidation Judiciaire un professionnel décédé ?",
        options: {
            A: "Dans un délai maximum de 5 ans après le décès.",
            B: "Dans l'année suivant le décès, à condition que la cessation des paiements soit intervenue avant le décès et que l'activité ait été publiée régulièrement.",
            C: "Seulement si les héritiers acceptent expressément de payer les dettes.",
            D: "Il n'y a aucune condition de temps ni de publication pour les créanciers."
        },
        correct: "B",
        explanation: "Les héritiers peuvent demander une PC sans limite de temps pour assainir la succession[cite: 151]. En revanche, un créancier ne dispose que d'une année à compter du décès (sous réserve de la preuve d'une CP antérieure et publiée) pour forcer l'ouverture d'une LJ[cite: 151]."
    },
    {
        id: 73,
        section: "P2.1",
        label: "Question 43 / 70",
        text: "Qu'énonce le grand principe jurisprudentiel 'faillite sur faillite ne vaut' (Art. L.631-5 et L.640-5) ?",
        options: {
            A: "Qu'une entreprise ne peut pas faire faillite si elle a moins de deux ans d'existence.",
            B: "Dès lors qu'une entreprise fait déjà l'objet d'un Redressement ou d'une Liquidation Judiciaire en cours, on ne peut pas ouvrir une seconde procédure collective parallèle à son encontre.",
            C: "Qu'un dirigeant ayant fait faillite une fois est banni à vie du monde des affaires.",
            D: "Que les dettes fiscales d'une ancienne faillite s'annulent automatiquement."
        },
        correct: "B",
        explanation: "Selon les articles L.631-5 et L.640-5, le patrimoine d'un débiteur étant déjà entièrement appréhendé par une PC active (RJ ou LJ), il est juridiquement impossible d'ouvrir une seconde procédure collective concurrente sur la même entité[cite: 154]."
    },
    {
        id: 74,
        section: "P2.1",
        label: "Question 44 / 70",
        text: "Quelle est la condition de fond impérative concernant la cessation des paiements pour ouvrir une procédure de sauvegarde de droit commun ?",
        options: {
            A: "Le débiteur doit prouver qu'il est en cessation des paiements depuis plus de 45 jours.",
            B: "Le débiteur ne doit PAS être en cessation des paiements, mais doit justifier de difficultés qu'il n'est pas en mesure de surmonter seul.",
            C: "La cessation des paiements doit être imminente dans les 24 heures.",
            D: "La sauvegarde s'ouvre indifféremment, qu'il y ait ou non cessation des paiements."
        },
        correct: "B",
        explanation: "L'article L.620-1 pose une condition négative stricte : l'absence de cessation des paiements au jour de la demande[cite: 157, 161]. Le dirigeant doit simplement démontrer des difficultés réelles qu'il ne peut résoudre par ses propres moyens[cite: 161]."
    },
    {
        id: 75,
        section: "P2.1",
        label: "Question 45 / 70",
        text: "L'accès à la sauvegarde exige-t-il que le débiteur fasse d'abord l'objet de poursuites judiciaires de la part de ses créanciers ?",
        options: {
            A: "Oui, il faut au moins trois saisies d'huissier en cours.",
            B: "Non, la Cour de cassation (Arrêts de 2007) précise que le débiteur peut demander la sauvegarde même s'il ne fait l'objet d'aucune poursuite individuelle.",
            C: "Uniquement si les dettes sont d'origine bancaire.",
            D: "Oui, sauf si l'entreprise compte plus de 500 salariés."
        },
        correct: "B",
        explanation: "La Cour de cassation a jugé dès juin 2007 que l'absence de poursuites n'interdit pas l'accès à la sauvegarde[cite: 163, 165]. Des difficultés financières à court terme (épuisement de lignes de crédit) ou de lourds investissements suffisent à la justifier[cite: 164]."
    },
    {
        id: 76,
        section: "P2.1",
        label: "Question 46 / 70",
        text: "Quelle est la différence temporelle sur la nature des difficultés entre la sauvegarde et la procédure de conciliation ?",
        options: {
            A: "La sauvegarde traite des difficultés futures uniquement.",
            B: "La sauvegarde exige des difficultés déjà NÉES (actuelles), alors que la conciliation englobe des difficultés actuelles OU simplement prévisibles.",
            C: "La conciliation s'applique uniquement aux dettes datant de plus de 5 ans.",
            D: "Il n'y a aucune différence temporelle dans les textes."
        },
        correct: "B",
        explanation: "L'article L.620-1 implique que pour la sauvegarde, les difficultés insurmontables doivent être concrètes et déjà nées[cite: 166]. À l'inverse, le traitement amiable par conciliation est plus large et ouvert face à un péril simplement 'prévisible'[cite: 166]."
    },
    {
        id: 77,
        section: "P2.1",
        label: "Question 47 / 70",
        text: "Qu'indique l'expression doctrinale 'il n'y a pas de devoir d'actionnaire' validée par la Cour de cassation (Arrêt du 26 juin 2007) ?",
        options: {
            A: "Que les actionnaires doivent obligatoirement rembourser les dettes de la filiale.",
            B: "Que les difficultés d'une société s'apprécient entité par entité, indépendamment de son appartenance à un groupe de sociétés fort ou riche.",
            C: "Que la société-mère est automatiquement mise en liquidation si sa filiale va mal.",
            D: "Que les actionnaires n'ont pas le droit de voter pendant la sauvegarde."
        },
        correct: "B",
        explanation: "L'appréciation de la situation de crise se fait de manière autonome, structure par structure[cite: 172]. Le fait qu'une filiale appartienne à un groupe puissant n'interdit pas l'ouverture de sa propre sauvegarde s'accorde à dire la jurisprudence[cite: 172, 173]."
    },
    {
        id: 78,
        section: "P2.1",
        label: "Question 48 / 70",
        text: "D'après le célèbre arrêt 'Cœur Défense' de 2011, peut-on refuser la sauvegarde à un débiteur au motif qu'il cherche à échapper à des obligations contractuelles ?",
        options: {
            A: "Oui, la recherche d'un avantage contractuel bloque l'accès à la sauvegarde.",
            B: "Non, on ne peut pas la refuser dès lors que le débiteur justifie objectivement de difficultés qu'il n'est pas en mesure de surmonter de lui-même.",
            C: "Seulement si le contrat en question a été signé avec une banque étrangère.",
            D: "L'arrêt Cœur Défense ne traite pas des aspects contractuels."
        },
        correct: "B",
        explanation: "L'arrêt Coeur Défense du 8 mars 2011 pose les jalons d'un véritable 'droit à la sauvegarde'[cite: 176, 200]. Peu importent les mobiles ou l'intention d'échapper à un contrat lourd, seule compte la réalité de l'impasse financière ou économique[cite: 176, 211]."
    },
    {
        id: 79,
        section: "P2.1",
        label: "Question 49 / 70",
        text: "Quelle est la logique de la 'Sauvegarde Accélérée' introduite en 2014 et réformée en 2021 ?",
        options: {
            A: "Passer directement de la case conciliation à la sauvegarde accélérée pour imposer en un temps record un plan de sauvegarde pré-négocié aux créanciers.",
            B: "Vendre les actifs de l'entreprise aux enchères en moins de 48 heures.",
            C: "Permettre au tribunal de licencier les dirigeants sans aucune audition.",
            D: "Éviter totalement le vote des créanciers."
        },
        correct: "A",
        explanation: "La sauvegarde accélérée sert de passerelle rapide[cite: 181]. Le plan est élaboré et négocié secrètement pendant la conciliation amiable [cite: 181, 194], puis la sauvegarde accélérée est ouverte pour le faire voter et l'adopter de manière contraignante en un temps record (4 mois maximum)[cite: 181, 197]."
    },
    {
        id: 80,
        section: "P2.1",
        label: "Question 50 / 70",
        text: "Comment fonctionne le calcul du poids des voix au sein des 'classes de parties affectées' pour voter un plan de sauvegarde accélérée ?",
        options: {
            A: "Chaque créancier dispose strictement d'une voix (1 personne = 1 voix).",
            B: "Le calcul se fait au prorata du montant de la créance : 1 euro de dette détenu = 1 voix. Plus on vous doit d'argent, plus votre vote pèse.",
            C: "Seul l'État et les banques ont le droit de voter.",
            D: "Le vote est déterminé par l'ancienneté du créancier sur le marché."
        },
        correct: "B",
        explanation: "Au sein des classes de parties affectées, la démocratie est purement financière [cite: 187] : le poids du vote est proportionnel aux sommes dues par le débiteur ('un euro de dette = une voix')[cite: 187]. La majorité des 2/3 des créances est requise pour valider le plan dans une classe[cite: 186]."
    },
    {
        id: 81,
        section: "P2.1",
        label: "Question 51 / 70",
        text: "Depuis 2021, quelles sont les conditions obligatoires pour ouvrir une sauvegarde accélérée ?",
        options: {
            A: "Avoir plus de 50 salariés et un total de bilan de 15 millions d'euros.",
            B: "Être déjà engagé dans une procédure de conciliation, y avoir préparé un projet de plan susceptible d'obtenir la majorité des classes, et en faire la demande.",
            C: "Être en cessation des paiements depuis plus de 6 mois.",
            D: "Avoir l'accord unanime de 100% des fournisseurs."
        },
        correct: "B",
        explanation: "L'ordonnance de 2021 a supprimé les anciens seuils de taille (salariés, CA)[cite: 190, 192]. Désormais, toute entreprise peut y accéder si elle est en conciliation [cite: 193] et possède un projet de plan ficelé avec le conciliateur[cite: 194, 195]."
    },
    {
        id: 82,
        section: "P2.1",
        label: "Question 52 / 70",
        text: "Que se passe-t-il si à l'issue du délai maximal de 4 mois en sauvegarde accélérée, aucun plan n'est accepté par les créanciers ?",
        options: {
            A: "L'entreprise est automatiquement nationalisée par l'État.",
            B: "Le tribunal prononce la clôture de la procédure accélérée, le débiteur perd la protection légale et revient à sa situation de départ.",
            C: "Toutes les dettes de la société sont définitivement annulées.",
            D: "L'administrateur judiciaire devient propriétaire de la société."
        },
        correct: "B",
        explanation: "L'article L.628-8 alinéa 1 limite la sauvegarde accélérée à 4 mois[cite: 197]. En cas d'échec de l'adoption du plan dans ce délai, le tribunal clôture simplement la procédure [cite: 198] et renvoie le débiteur à ses responsabilités classiques de déclaration d'ECP[cite: 198, 211]."
    },
    {
        id: 83,
        section: "P2.1",
        label: "Question 53 / 70",
        text: "Quelle est la définition juridique exacte de l'état de cessation des paiements (ECP) énoncée à l'article L.631-1 ?",
        options: {
            A: "L'insuffisance manifeste des capitaux propres par rapport au capital social.",
            B: "L'impossibilité pour le débiteur de faire face à son passif exigible avec son actif disponible.",
            C: "Le simple fait d'avoir accumulé plus de 3 mois de retards de paiement de loyers.",
            D: "La fermeture définitive des locaux commerciaux ou des usines."
        },
        correct: "B",
        explanation: "L'article L.631-1 pose l'équation comptable et juridique de la faillite [cite: 209] : l'état de cessation des paiements est caractérisé quand l'actif directement disponible (trésorerie) ne permet plus de couvrir les dettes arrivées à échéance (passif exigible)[cite: 209]."
    },
    {
        id: 84,
        section: "P2.1",
        label: "Question 54 / 70",
        text: "Qu'englobe la notion de 'passif exigible' pour caractériser la cessation des paiements ?",
        options: {
            A: "Toutes les dettes futures et potentielles de l'entreprise jusqu'à la fin de l'année.",
            B: "Uniquement les dettes certaines, liquides et exigibles dont l'échéance est arrivée à son terme.",
            C: "Les dettes litigieuses dont le montant est contesté devant un juge du fond.",
            D: "Uniquement les dettes contractées auprès du Trésor Public."
        },
        correct: "B",
        explanation: "Le passif exigible se limite aux dettes échues et certaines[cite: 210]. Une simple demande de paiement anticipée ou une créance contestée sérieusement au fond sur son existence n'entre pas dans le calcul du passif exigible[cite: 210]."
    },
    {
        id: 85,
        section: "P2.1",
        label: "Question 55 / 70",
        text: "Une dette échue peut-elle être écartée du passif exigible si le créancier fait preuve d'inertie ou n'en réclame pas le paiement ?",
        options: {
            A: "Oui, si le créancier n'envoie pas de lettre de relance, la dette n'est plus exigible.",
            B: "Non, la Cour de cassation (Arrêt du 15 février 2011) retient que la seule inertie du créancier ne suffit pas à écarter le caractère exigible de la dette.",
            C: "Oui, mais uniquement pour les dettes entre commerçants.",
            D: "Seulement si le débiteur a bloqué la somme sur un compte tiers."
        },
        correct: "B",
        explanation: "La jurisprudence de 2011 rappelle que l'inaction d'un créancier ne fait pas disparaître l'exigibilité de sa créance[cite: 210]. Le passif reste exigible sauf si le débiteur démontre l'octroi d'un véritable délai moratoire ou d'une facilité de paiement formelle[cite: 210]."
    },
    {
        id: 86,
        section: "P2.1",
        label: "Question 56 / 70",
        text: "Qu'est-ce qui entre dans la composition de l'actif disponible d'une entreprise ?",
        options: {
            A: "L'ensemble des stocks de marchandises et les bâtiments de l'usine.",
            B: "La trésorerie immédiatement mobilisable (comptes bancaires, caisse), les chèques de banque provisionnés et les réserves de crédit confirmées.",
            C: "Les créances incertaines ou aléatoires détenues sur des clients en difficulté.",
            D: "Les apports en numéraire signés par les associés mais non encore libérés."
        },
        correct: "B",
        explanation: "L'actif disponible est l'actif liquide ou directement mobilisable[cite: 210]. Il comprend le solde des comptes, les chèques de banque (provision garantie) [cite: 210] et les réserves de crédit[cite: 210]. Les immeubles ou les créances clients aléatoires sont exclus car non liquides à très court terme[cite: 210]."
    },
    {
        id: 87,
        section: "P2.1",
        label: "Question 57 / 70",
        text: "Un compte courant d'associé entre-t-il dans le calcul de l'actif disponible de la société ?",
        options: {
            A: "Non, jamais, car c'est de l'argent appartenant à un tiers.",
            B: "Oui, il est pris en compte à l'actif disponible sauf s'il existe une clause de blocage en vigueur empêchant son remboursement immédiat.",
            C: "Uniquement si la société est une SA cotée en bourse.",
            D: "Oui, mais seulement pour un montant fixe de 10 000 € maximum."
        },
        correct: "B",
        explanation: "Selon un arrêt du 12 mai 2009, les fonds en compte courant d'associé constituent de l'actif disponible car l'associé peut théoriquement en demander le remboursement à tout moment, sauf si les statuts ou une convention prévoient une clause de blocage[cite: 210]."
    },
    {
        id: 88,
        section: "P2.1",
        label: "Question 58 / 70",
        text: "À qui incombe la charge de la preuve de l'état de cessation des paiements devant le tribunal ?",
        options: {
            A: "Au Juge-Commissaire d'office.",
            B: "À celui qui se prévaut de cet état de cessation des paiements (le débiteur lui-même ou le créancier poursuivant).",
            C: "À l'expert-comptable de l'entreprise de manière exclusive.",
            D: "Au greffier du tribunal de commerce."
        },
        correct: "B",
        explanation: "C'est l'application du droit commun de la preuve : la charge repose sur le demandeur (le débiteur demandant son RJ/LJ, ou le créancier assignant)[cite: 210]. Le créancier doit apporter des éléments sérieux, la simple preuve d'une poursuite vaine ne suffisant pas (Jurisprudence 1996)[cite: 210]."
    },
    {
        id: 89,
        section: "P2.1",
        label: "Question 59 / 70",
        text: "Quelle est la différence fondamentale de condition entre le Redressement (RJ) et la Liquidation Judiciaire (LJ) ?",
        options: {
            A: "Le RJ s'applique aux grandes entreprises, la LJ aux petites.",
            B: "Le RJ nécessite une simple cessation des paiements, tandis que la LJ exige en plus de prouver que le redressement de l'entreprise est manifestement impossible.",
            C: "La LJ ne nécessite pas d'état de cessation des paiements.",
            D: "Il n'y a aucune différence de condition, le choix est laissé au pouvoir discrétionnaire du Procureur."
        },
        correct: "B",
        explanation: "L'article L.631-1 et la règle de gradation l'imposent [cite: 208] : le RJ s'ouvre s'il y a cessation des paiements mais un espoir de continuation[cite: 85, 208]. La LJ s'impose si la situation comptable et les perspectives de CA sont tellement compromises que tout redressement est manifestement impossible[cite: 86, 208, 210]."
    },
    {
        id: 90,
        section: "P2.1",
        label: "Question 60 / 70",
        text: "L'ouverture d'une Liquidation Judiciaire interdit-elle définitivement le rachat de l'activité par un repreneur tiers ?",
        options: {
            A: "Oui, la liquidation entraîne l'arrêt de mort immédiat et la vente en pièces détachées.",
            B: "Non, le redressement impossible s'apprécie 'pour le débiteur actuel', mais un repreneur tiers peut formuler des offres de rachat (plans de cession) pour maintenir l'activité.",
            C: "Oui, sauf si l'État décide de racheter lui-même les stocks.",
            D: "Seulement si le Juge-Commissaire est membre de la famille du dirigeant."
        },
        correct: "B",
        explanation: "La formule 'manifestement impossible pour le débiteur' laisse la porte ouverte au rebond de la structure[cite: 211]. Un tiers repreneur peut proposer un plan de cession global, permettant de sauver l'activité et l'emploi malgré la liquidation de la PM d'origine[cite: 211]."
    },
    {
        id: 91,
        section: "P2.1",
        label: "Question 61 / 70",
        text: "Qu'est-ce que la conversion de procédure au cours de la période d'observation ?",
        options: {
            A: "Le droit de transformer une dette commerciale en un apport en capital social.",
            B: "La possibilité pour le tribunal de basculer d'une sauvegarde à un redressement ou d'un redressement à une liquidation si la situation financière du débiteur se dégrade.",
            C: "Le changement de nationalité juridique de l'entreprise en crise.",
            D: "La fusion de deux entreprises en faillite."
        },
        correct: "B",
        explanation: "Le droit des PC est pragmatique et évolutif[cite: 211]. Si la période d'observation révèle que la sauvegarde est insuffisante ou que l'entreprise est en réalité en cessation des paiements, le tribunal peut prononcer la conversion en RJ ou en LJ[cite: 211]."
    },
    {
        id: 92,
        section: "P2.1",
        label: "Question 62 / 70",
        text: "Pourquoi la conversion en redressement est-elle exclue en matière de Sauvegarde Accélérée ?",
        options: {
            A: "Parce que la loi interdit de modifier une procédure accélérée.",
            B: "Parce qu'en cas d'échec du vote des classes, le tribunal prononce simplement la clôture de la procédure, faisant sauter les protections, et le débiteur doit redemander une nouvelle procédure s'il est en CP.",
            C: "Parce que les banques y sont opposées par contrat.",
            D: "La sauvegarde accélérée peut être convertie en RJ à tout moment."
        },
        correct: "B",
        explanation: "Le document précise qu'en sauvegarde accélérée, si l'adoption du plan échoue, le tribunal clôture purement et simplement la procédure[cite: 211]. Le débiteur perd le bénéfice du gel des poursuites et doit réassigner ou déclarer son ECP dans un cadre classique[cite: 211]."
    },
    {
        id: 93,
        section: "P2.1",
        label: "Question 63 / 70",
        text: "Qu'est-ce que le mécanisme de l'extension de procédure collective (Art. L.621-2) ?",
        options: {
            A: "Le droit d'ouvrir des succursales à l'étranger pendant la période d'observation.",
            B: "Une mesure d'exception permettant d'englober le patrimoine d'une autre personne (PP ou PM) dans la même procédure collective unique en cas de confusion des patrimoines ou de fictivité.",
            C: "L'allongement automatique de la durée de remboursement de 10 ans.",
            D: "Le transfert de la procédure du Tribunal de commerce vers le Tribunal pénal."
        },
        correct: "B",
        explanation: "L'extension de procédure (L.621-2) est un dispositif d'exception lourd et encadré[cite: 219, 230]. Elle réunit plusieurs patrimoines distincts au sein d'une seule et unique procédure collective [cite: 221], en sanctionnant un désordre patrimonial (confusion ou fictivité)[cite: 229, 237]."
    },
    {
        id: 94,
        section: "P2.1",
        label: "Question 64 / 70",
        text: "Quelle date d'ouverture le tribunal retient-il pour mener la procédure étendue à un second débiteur ?",
        options: {
            A: "La date du jugement qui a prononcé l'extension.",
            B: "La date du jugement d'ouverture de la toute première procédure collective (rétroactivité de l'extension).",
            C: "Une date intermédiaire fixée librement par le Juge-Commissaire.",
            D: "La date de création de la deuxième société."
        },
        correct: "B",
        explanation: "Selon la jurisprudence constante de la Cour de cassation (Arrêts de 1995 et 2004), l'extension entraîne une unicité de procédure[cite: 221]. Le tribunal retient impérativement la date du jugement d'ouverture initial [cite: 222, 224] pour fixer la période suspecte globale[cite: 223]."
    },
    {
        id: 95,
        section: "P2.1",
        label: "Question 65 / 70",
        text: "Quels sont les deux grands critères historiques retenus par la jurisprudence pour caractériser une 'confusion des patrimoines' ?",
        options: {
            A: "Le partage des mêmes locaux et l'utilisation des mêmes ordinateurs.",
            B: "L'existence d'une imbrication inextricable des patrimoines (impossible de dissocier les actifs/passifs) OU l'existence de relations financières anormales entre les entités.",
            C: "Le fait d'avoir le même dirigeant et les mêmes clients.",
            D: "Le partage exclusif des bénéfices en fin d'année."
        },
        correct: "B",
        explanation: "La Cour de cassation a d'abord défini la confusion dans les années 1990 par 'l'imbrication inextricable des patrimoines' (Arrêt de 1995) [cite: 239, 240], avant d'ajouter dans les années 2000 le critère alternatif des 'relations financières anormales' caractérisant un désordre patrimonial systématique[cite: 241, 247]."
    },
    {
        id: 96,
        section: "P2.1",
        label: "Question 66 / 70",
        text: "Qu'est-ce qui caractérise un flux financier ou une relation financière comme 'anormale' selon la Cour de cassation ?",
        options: {
            A: "Tout virement bancaire supérieur à 50 000 €.",
            B: "Un transfert d'actifs ou de valeur sans aucune contrepartie directe ou indirecte pour l'entité qui s'appauvrit (ex : abandon de créance sans clause de retour à meilleure fortune, non-perception de loyers).",
            C: "Le paiement des factures à 30 jours au lieu de 45 jours.",
            D: "L'octroi d'un prêt au taux d'intérêt légal du marché."
        },
        correct: "B",
        explanation: "L'anormalité réside dans l'absence de justification économique ou de contrepartie[cite: 247, 248]. Renoncer à percevoir des loyers (Arrêt de 2002) [cite: 248] ou consentir un abandon de créance sec sans clause de retour à meilleure fortune constitue l'aveu d'une confusion des patrimoines[cite: 247]."
    },
    {
        id: 97,
        section: "P2.1",
        label: "Question 67 / 70",
        text: "Faut-il prouver une faute de gestion ou une dégradation de la situation du débiteur pour obtenir l'extension pour relations financières anormales ?",
        options: {
            A: "Oui, la preuve d'une faute intentionnelle et d'un préjudice financier est obligatoire.",
            B: "Non, la Cour de cassation (Arrêts de 2015 et 2025) affirme que les relations financières anormales se suffisent à elles-mêmes, sans besoin d'établir une faute ou une aggravation de la situation.",
            C: "Uniquement si l'action est menée par le Ministère Public.",
            D: "Oui, sauf si la comptabilité a été certifiée par un Commissaire aux Comptes."
        },
        correct: "B",
        explanation: "Par des arrêts de 2015 et du 26 mars 2025, la Cour de cassation a affirmé que l'anormalité des flux financiers suffit à elle seule à fonder l'extension[cite: 249, 250, 252]. Il n'y a pas besoin de démontrer une faute civile du dirigeant [cite: 251, 252] ni un impact direct sur la solvabilité[cite: 250]."
    },
    {
        id: 98,
        section: "P2.1",
        label: "Question 68 / 70",
        text: "Quelle souplesse la jurisprudence applique-t-elle aux flux financiers au sein d'un 'groupe de sociétés' (Arrêt MetalEurop de 2005) ?",
        options: {
            A: "Elle interdit strictement toute avance de fonds entre les filiales d'un même groupe.",
            B: "Elle apprécie la normalité au regard des pratiques courantes de groupe (les conventions de gestion de trésorerie, avances de fonds à taux légal ou prêts de personnel sont présumés normaux).",
            C: "Elle fusionne d'office toutes les filiales dès qu'un virement est opéré.",
            D: "Elle délègue le contrôle des groupes au Parlement européen."
        },
        correct: "B",
        explanation: "L'arrêt MetalEurop du 19 avril 2005 énonce que l'existence de conventions de trésorerie centralisées ou d'avances réciproques est inhérente à la vie d'un groupe[cite: 256]. Ces actes sont jugés normaux s'ils respectent les conditions de marché basiques, écartant l'extension automatique[cite: 254, 256]."
    },
    {
        id: 99,
        section: "P2.1",
        label: "Question 69 / 70",
        text: "Qu'est-ce que la cause d'extension pour 'fictivité de la personne morale' ?",
        options: {
            A: "Une société qui n'a jamais été immatriculée au Registre du commerce.",
            B: "L'interposition frauduleuse d'une personne morale écran qui n'a aucune autonomie ni activité réelle, masquant en réalité l'activité individuelle du maître de l'affaire.",
            C: "Une entreprise qui vend des produits virtuels sur Internet.",
            D: "Une association loi 1901 transformée en multinationale."
        },
        correct: "B",
        explanation: "La fictivité sanctionne l'absence d'affectio societatis et de réalité concrète de la PM (société écran créée pour faire éponge à dettes et frauder les créanciers)[cite: 260]. Le droit des PC l'utilise pour lever le voile social et attraper le véritable maître de l'affaire[cite: 260, 262]."
    },
    {
        id: 100,
        section: "P2.1",
        label: "Question 70 / 70",
        text: "Quelle limite importante le principe de non-rétroactivité fixe-t-il aux effets du jugement d'extension (Arrêt de 1997) ?",
        options: {
            A: "Le débiteur étendu est considéré en faillite depuis sa naissance.",
            B: "Le débiteur étendu n'est pas considéré comme dessaisi de ses pouvoirs de gestion en amont du jugement d'extension ; on ne peut pas annuler ses actes courants pour absence de mandataire.",
            C: "Les créanciers du second patrimoine perdent tout droit d'agir en justice.",
            D: "L'extension s'applique uniquement aux dettes futures nées après la clôture."
        },
        correct: "B",
        explanation: "L'extension crée une procédure unique [cite: 221] mais ne fait pas rétroagir le dessaisissement des pouvoirs de gestion[cite: 271, 272]. Le dirigeant du patrimoine étendu conserve la validité de ses actes d'administration passés jusqu'au jour où le jugement d'extension est officiellement prononcé[cite: 274, 277]."
    },

    {

    {

    {

        options: {

            B: "Il doit notifier sa décision par écrit et respecter un préavis, sans agir de manière abusive ou précipiter les difficultés sous peine de responsabilité.",

        let currentSection = 'all';
        // Structure de sauvegarde locale : { questionId: { selectedOption: 'A', validated: true } }
        let userProgress = JSON.parse(localStorage.getItem('qcm_progress_save')) || {};

        // INITIALISATION AU CHARGEMENT
        document.addEventListener("DOMContentLoaded", () => {
            renderQuestions();
            updateScoreAndProgress();
        });

        // RE-DESSINER LES QUESTIONS SUR L'ÉCRAN
        function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = '';

            // Filtrer les questions selon l'onglet actif
            const filteredQuestions = questionsData.filter(q => currentSection === 'all' || q.section === currentSection);

            if(filteredQuestions.length === 0) {
                container.innerHTML = `<div class="text-center p-8 bg-white rounded-2xl border border-slate-200 text-slate-500 font-medium">Aucune question dans cette section pour le moment.</div>`;
                return;
            }

            filteredQuestions.forEach(q => {
                const progress = userProgress[q.id] || {};
                const isValidated = progress.validated || false;
                const savedOption = progress.selectedOption || null;

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl p-5 shadow-sm border border-slate-100 transition-all ${isValidated ? 'opacity-90' : ''}`;
                card.id = `card-${q.id}`;

                // Header de la carte de question
                let html = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[11px] font-extrabold uppercase tracking-wider bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md">Section ${q.section}</span>
                        <span class="text-xs font-semibold text-indigo-500">${q.label}</span>
                    </div>
                    <p class="font-bold text-slate-950 mb-4 text-[15px] leading-snug">${q.text}</p>
                    <div class="space-y-2.5" id="options-group-${q.id}">
                `;

                // Génération des 4 boutons d'options (A, B, C, D)
                Object.keys(q.options).forEach(optKey => {
                    let btnClass = "w-full text-left p-4 rounded-xl border border-slate-200 text-sm font-semibold transition-all flex items-center justify-between active:scale-[0.99] ";
                    
                    if (isValidated) {
                        // Rendu si déjà validé
                        if (optKey === q.correct) {
                            btnClass += "bg-emerald-50 border-emerald-500 text-emerald-800 ring-2 ring-emerald-500/20";
                        } else if (optKey === savedOption && savedOption !== q.correct) {
                            btnClass += "bg-red-50 border-red-400 text-red-800";
                        } else {
                            btnClass += "bg-slate-50 text-slate-400 border-slate-100";
                        }
                    } else {
                        // Rendu si en cours de sélection
                        if (optKey === savedOption) {
                            btnClass += "border-indigo-600 bg-indigo-50 text-indigo-900 ring-2 ring-indigo-600/10";
                        } else {
                            btnClass += "bg-white hover:bg-slate-50 text-slate-700 border-slate-200";
                        }
                    }

                    // Icône de validation visuelle simple
                    let checkIcon = "";
                    if (isValidated && optKey === q.correct) checkIcon = "<span>✅</span>";
                    if (isValidated && optKey === savedOption && savedOption !== q.correct) checkIcon = "<span>❌</span>";

                    html += `
                        <button onclick="selectOption(${q.id}, '${optKey}')" ${isValidated ? 'disabled' : ''} class="${btnClass}">
                            <span class="pr-2">${optKey}. ${q.options[optKey]}</span>
                            ${checkIcon}
                        </button>
                    `;
                });

                html += `</div>`;

                // Bouton de validation d'action
                if (!isValidated) {
                    html += `
                        <button onclick="validateAnswer(${q.id}, '${q.correct}')" id="btn-valider-${q.id}" class="mt-4 w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold text-sm shadow-sm active:scale-95 transition-all">
                            Valider ma réponse
                        </button>
                    `;
                }

                // Boîte d'explication cachée ou visible
                html += `
                    <div id="explanation-${q.id}" class="${isValidated ? '' : 'hidden'} mt-4 p-4 bg-gradient-to-br from-slate-50 to-indigo-50/30 rounded-xl border border-slate-100 text-xs text-slate-700 leading-relaxed">
                        <span class="font-extrabold text-slate-900 block mb-1 text-sm">💡 Explication pédagogique :</span>
                        ${q.explanation}
                    </div>
                `;

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // ACTION DE CLIC SUR UNE OPTION
        function selectOption(questionId, optionKey) {
            if (userProgress[questionId] && userProgress[questionId].validated) return;

            // Enregistrer le choix temporaire
            userProgress[questionId] = {
                selectedOption: optionKey,
                validated: false
            };

            // Sauvegarder l'état
            localStorage.setItem('qcm_progress_save', JSON.stringify(userProgress));
            
            // Rafraîchir visuellement la liste sans tout recharger
            renderQuestions();
        }

        // ACTION DE VALIDATION DE LA RÉPONSE
        function validateAnswer(questionId, correctOption) {
            if (!userProgress[questionId] || !userProgress[questionId].selectedOption) {
                alert("S'il te plaît, choisis une réponse avant de valider ! 😊");
                return;
            }

            userProgress[questionId].validated = true;
            localStorage.setItem('qcm_progress_save', JSON.stringify(userProgress));

            // Mettre à jour l'affichage de la carte et du score global
            renderQuestions();
            updateScoreAndProgress();
        }

        // MISE À JOUR DU SCORE ET DE LA BARRE DE PROGRESSION
        function updateScoreAndProgress() {
            const totalQuestions = questionsData.length;
            let validatedCount = 0;
            let correctCount = 0;

            questionsData.forEach(q => {
                if (userProgress[q.id] && userProgress[q.id].validated) {
                    validatedCount++;
                    if (userProgress[q.id].selectedOption === q.correct) {
                        correctCount++;
                    }
                }
            });

            // Mettre à jour le texte du score
            document.getElementById('global-score').innerText = `Score : ${correctCount} / ${totalQuestions}`;

            // Calculer le pourcentage de complétion globale
            const percent = totalQuestions > 0 ? (validatedCount / totalQuestions) * 100 : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // CHANGEMENT D'ONGLET (FILTRE)
        function switchSection(sectionId) {
            currentSection = sectionId;
            
            // Mettre à jour le style visuel des onglets en haut
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });

            const activeTab = document.getElementById(`tab-${sectionId}`);
            activeTab.classList.remove('bg-slate-100', 'text-slate-600');
            activeTab.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');

            renderQuestions();
        }

        // RÉINITIALISATION COMPLÈTE
        function resetApp() {
            if (confirm("Es-tu sûre de vouloir réinitialiser tout ton historique de révisions ?")) {
                localStorage.removeItem('qcm_progress_save');
                userProgress = {};
                switchSection('all');
                updateScoreAndProgress();
            }
        }
    </script>
